<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ngrok Dashboard - OpenCode Config</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-0: #edf2f5; --bg-1: #e3eaef; --bg-2: #dfe7eb;
    --ink-strong: #20303a; --ink: #344854; --ink-soft: #647682;
    --surface: rgba(255,255,255,0.78); --surface-glass: rgba(255,255,255,0.66);
    --border: rgba(32,48,58,0.1); --accent: #466a5a; --accent-strong: #355247;
    --ok: #2e7d44; --ok-bg: rgba(46,125,68,0.10);
    --down: #a84747; --down-bg: rgba(168,71,71,0.10);
    --radius-card: 24px; --radius-btn: 999px; --radius-pill: 14px;
    --text-xs: 0.84rem; --text-sm: 0.95rem; --text-md: 1rem; --text-lg: 1.2rem;
  }
  body {
    font-family: 'Roboto', system-ui, sans-serif;
    background: linear-gradient(135deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
    color: var(--ink); min-height: 100vh; padding: 2rem 1rem;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .back-link { display: inline-block; color: var(--accent); text-decoration: none; font-weight: 500; margin-bottom: 1.5rem; font-size: var(--text-sm); }
  .back-link:hover { color: var(--accent-strong); }
  h1 { color: var(--ink-strong); font-size: 1.6rem; margin-bottom: 2rem; }
  h2 { color: var(--ink-strong); font-size: 1.1rem; margin-bottom: 0.75rem; }
  .error-banner { background: var(--down-bg); color: var(--down); padding: 0.75rem 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: var(--text-sm); border: 1px solid rgba(168,71,71,0.18); }
  .hidden { display: none !important; }
  .favorites-row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.5rem; }
  .fav-chip { display: flex; align-items: center; gap: 0.4rem; background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 0.4rem 0.8rem; font-size: var(--text-xs); cursor: pointer; user-select: none; transition: background 0.15s; }
  .fav-chip:hover { background: var(--surface); border-color: var(--accent); }
  .fav-chip--inherit { background: rgba(70,106,90,0.06); border-color: var(--accent); border-style: dashed; }
  .fav-chip--inherit:hover { background: rgba(70,106,90,0.12); }
  .fav-provider { color: var(--ink-soft); }
  .fav-model { color: var(--ink-strong); font-weight: 500; }
  .inherit-icon { color: var(--accent); font-size: 0.9rem; font-weight: 600; }
  .star { font-size: 0.9rem; cursor: pointer; }
  .star.filled { color: #d4a017; }
  .star.outline { color: var(--ink-soft); }
  .hint { color: var(--ink-soft); font-size: var(--text-xs); }
  .section { margin-bottom: 2rem; }
  .agent-row { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .agent-row.expanded { background: var(--surface-glass); border-radius: 12px; border-bottom: none; margin-bottom: 0.25rem; }
  .agent-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 0.75rem; cursor: pointer; user-select: none; }
  .agent-name { font-weight: 600; color: var(--ink-strong); min-width: 100px; }
  .agent-current { color: var(--ink-soft); font-size: var(--text-sm); flex: 1; }
  .expand-arrow { color: var(--ink-soft); font-size: 0.8rem; }
  .agent-controls { display: flex; align-items: center; gap: 0.5rem; padding: 0 0.75rem 0.85rem 0.75rem; }
  .agent-controls select { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--ink); font-size: var(--text-xs); font-family: inherit; outline: none; }
  .agent-controls select:focus { border-color: var(--accent); }
  .actions { display: flex; gap: 0.75rem; margin-top: 2rem; }
  .btn-save, .btn-restore { padding: 0.75rem 1.5rem; border: none; border-radius: var(--radius-btn); font-size: var(--text-sm); font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, opacity 0.15s; }
  .btn-save { background: var(--accent); color: #fff; }
  .btn-save:hover { background: var(--accent-strong); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-restore { background: var(--surface-glass); color: var(--ink); border: 1px solid var(--border); }
  .btn-restore:hover { background: var(--surface); }
  .restart-banner { margin-top: 1rem; padding: 0.75rem 1rem; background: rgba(176,130,44,0.10); color: #b0822c; border-radius: 12px; font-size: var(--text-sm); border: 1px solid rgba(176,130,44,0.18); }
</style>
</head>
<body>
<div class="container">
  <a href="/dash" class="back-link">← Back to Dashboard</a>
  <h1>OpenCode Config</h1>
  <div id="error-banner" class="error-banner hidden"></div>
  <section class="section">
    <h2>★ Favorites</h2>
    <div id="favorites-row" class="favorites-row"></div>
    <p id="no-favorites" class="hint">No favorites yet. Expand a subagent, pick a model, and click ☆ to bookmark it.</p>
  </section>
  <section class="section">
    <h2>Subagents</h2>
    <p id="no-models-hint" class="hint hidden">No models discovered. Check your opencode provider configuration or API keys.</p>
    <div id="agents-container"></div>
  </section>
  <div class="actions">
    <button id="btn-save" class="btn-save">Save Changes</button>
    <button id="btn-restore" class="btn-restore">Restore Defaults</button>
  </div>
  <div id="restart-banner" class="restart-banner hidden">⚠ Restart opencode after saving for changes to take effect.</div>
</div>
<script>
const API = '/api/opencode';
let models = [], providers = [], agents = {}, defaults = {}, favorites = [], expandedAgent = null;

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Accept': 'application/json' }, ...opts });
  if (res.status === 401) { window.location.href = '/auth/login'; return { ok: false, error: 'Session expired' }; }
  return res.json();
}
async function apiPost(url, body) {
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(body) });
  if (res.status === 401) { window.location.href = '/auth/login'; return { ok: false, error: 'Session expired' }; }
  return res.json();
}

function esc(str) { if (!str) return ''; return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function isVisionModel(m) {
  if (!m || !m.capabilities) return false;
  return !!(m.capabilities.input && (m.capabilities.input.image || m.capabilities.input.video));
}
function findModel(provider, modelId) {
  for (var i = 0; i < models.length; i++) {
    if (models[i].provider === provider && models[i].id === modelId) return models[i];
  }
  return null;
}
function showError(msg) { const b = document.getElementById('error-banner'); b.textContent = msg; b.classList.remove('hidden'); }

async function init() {
  let configOk = true;
  try {
    const [modelsData, configData, favData] = await Promise.all([
      apiFetch(API + '/models'), apiFetch(API + '/config'), apiFetch(API + '/favorites')
    ]);
    if (modelsData.ok) { models = modelsData.models || []; providers = modelsData.providers || []; }
    else { showError(modelsData.error || 'Failed to load models'); }
    if (configData.ok) { agents = configData.agents || {}; defaults = JSON.parse(JSON.stringify(agents)); }
    else { showError(configData.error || 'Failed to load config'); configOk = false; }
    if (favData.ok) { favorites = favData.favorites || []; }
    if (!configOk) {
      const btn = document.getElementById('btn-save'); btn.disabled = true; btn.textContent = 'Save Unavailable';
    }
  } catch (e) { showError('Connection error: ' + e.message); }
  render();
}

function render() {
  renderFavorites();
  renderAgents();
  if (models.length === 0 && providers.length === 0) {
    document.getElementById('no-models-hint').classList.remove('hidden');
  } else {
    document.getElementById('no-models-hint').classList.add('hidden');
  }
}

function renderFavorites() {
  const row = document.getElementById('favorites-row');
  const hint = document.getElementById('no-favorites');
  row.innerHTML = '';
  
  // Hardcoded "Use parent model" chip — always visible
  const inheritChip = document.createElement('div');
  inheritChip.className = 'fav-chip fav-chip--inherit';
  inheritChip.innerHTML = '<span class="fav-model">Use parent model</span> <span class="inherit-icon">↳</span>';
  inheritChip.addEventListener('click', function() {
    if (expandedAgent) {
      agents[expandedAgent].model = '__inherit__';
      agents[expandedAgent].modelId = null;
      agents[expandedAgent].inherit = true;
      agents[expandedAgent].provider = agents[expandedAgent].provider || (providers[0]?.id);
      renderAgents();
    }
  });
  row.appendChild(inheritChip);

  if (favorites.length === 0) { hint.style.display = 'block'; return; }
  hint.style.display = 'none';
  for (const fav of favorites) {
    const chip = document.createElement('div'); chip.className = 'fav-chip';
    var fm = findModel(fav.provider, fav.model);
    chip.innerHTML = '<span class="fav-provider">' + esc(fav.provider) + '</span> <span class="fav-model">' + esc(fav.model) + (isVisionModel(fm) ? ' (V)' : '') + '</span> <span class="star filled">★</span>';
    chip.addEventListener('click', function(e) {
      if (e.target.classList.contains('star')) return;
      if (expandedAgent) { agents[expandedAgent].provider = fav.provider; agents[expandedAgent].modelId = fav.model; agents[expandedAgent].model = fav.provider + '/' + fav.model; agents[expandedAgent].inherit = false; renderAgents(); }
    });
    chip.querySelector('.star').addEventListener('click', function(e) { e.stopPropagation(); removeFavorite(fav); });
    row.appendChild(chip);
  }
}

function isFavorited(provider, model) { return favorites.some(function(f) { return f.provider === provider && f.model === model; }); }

function renderAgents() {
  var container = document.getElementById('agents-container');
  container.innerHTML = '';
  var names = Object.keys(agents).sort();
  if (names.length === 0) { container.innerHTML = '<p class="hint">No subagents found in opencode.json. Add agents with "mode": "subagent" to configure them here.</p>'; return; }
  for (var ni = 0; ni < names.length; ni++) {
    var name = names[ni], agent = agents[name], isExpanded = expandedAgent === name, agentModel = findModel(agent.provider, agent.modelId);
    var isInherit = agent.inherit === true;
    var displayLabel = isInherit ? 'Using parent model' : (esc(agent.provider) + ' › ' + esc(agent.modelId) + (isVisionModel(agentModel) ? ' (V)' : ''));
    var row = document.createElement('div');
    row.className = 'agent-row' + (isExpanded ? ' expanded' : '');
    if (isExpanded) {
      var currentModelId = isInherit ? '__inherit__' : agent.modelId;
      row.innerHTML = '<div class="agent-header"><span class="agent-name">' + esc(name) + '</span><span class="agent-current">' + displayLabel + '</span><span class="expand-arrow">▾</span></div>' +
        '<div class="agent-controls">' +
        '<span class="star ' + (isInherit ? 'outline' : (isFavorited(agent.provider, agent.modelId) ? 'filled' : 'outline')) + '">' + ((!isInherit && isFavorited(agent.provider, agent.modelId)) ? '★' : '☆') + '</span>' +
        '<select class="sel-provider">' + providers.map(function(p) { return '<option value="' + esc(p.id) + '"' + (p.id === agent.provider ? ' selected' : '') + '>' + esc(p.name || p.id) + '</option>'; }).join('') + '</select>' +
        '<select class="sel-model">' +
        '<option value="__inherit__"' + (isInherit ? ' selected' : '') + '>Use parent model</option>' +
        models.filter(function(m) { return m.provider === (isInherit ? providers[0]?.id : agent.provider); }).map(function(m) { return '<option value="' + esc(m.id) + '"' + (m.id === agent.modelId ? ' selected' : '') + '>' + esc((m.name || m.id) + (isVisionModel(m) ? ' (V)' : '')) + '</option>'; }).join('') + '</select></div>';
    } else {
      row.innerHTML = '<div class="agent-header"><span class="agent-name">' + esc(name) + '</span><span class="agent-current">' + displayLabel + '</span><span class="expand-arrow">▸</span></div>';
    }
    row.querySelector('.agent-header').addEventListener('click', function(n) { return function() { expandedAgent = expandedAgent === n ? null : n; renderAgents(); }; }(name));
    var selProv = row.querySelector('.sel-provider'), selModel = row.querySelector('.sel-model');
    if (selProv) {
      selProv.addEventListener('change', function(n, sp, sm) { return function() {
        var np = sp.value; agents[n].provider = np; agents[n].inherit = false;
        var filtered = models.filter(function(m) { return m.provider === np; });
        var inheritOpt = '<option value="__inherit__">Use parent model</option>';
        sm.innerHTML = inheritOpt + filtered.map(function(m) { return '<option value="' + esc(m.id) + '">' + esc((m.name || m.id) + (isVisionModel(m) ? ' (V)' : '')) + '</option>'; }).join('');
        if (filtered.length > 0) { agents[n].modelId = filtered[0].id; agents[n].model = np + '/' + filtered[0].id; sm.value = filtered[0].id; }
        else { agents[n].modelId = null; agents[n].model = null; agents[n].inherit = true; sm.value = '__inherit__'; }
      }; }(name, selProv, selModel));
    }
    if (selModel) {
      selModel.addEventListener('change', function(n, sm) { return function() {
        var v = sm.value;
        if (v === '__inherit__') { agents[n].model = '__inherit__'; agents[n].modelId = null; agents[n].provider = agents[n].provider || (providers[0]?.id); agents[n].inherit = true; }
        else { agents[n].modelId = v; agents[n].model = agents[n].provider + '/' + v; agents[n].inherit = false; }
      }; }(name, selModel));
    }
    var star = row.querySelector('.star');
    if (star) {
      star.addEventListener('click', function(n) { return function(e) {
        e.stopPropagation();
        if (agents[n].inherit) return;
        if (isFavorited(agents[n].provider, agents[n].modelId)) { removeFavorite({ provider: agents[n].provider, model: agents[n].modelId }); }
        else { addFavorite(agents[n].provider, agents[n].modelId); }
      }; }(name));
    }
    container.appendChild(row);
  }
}

async function addFavorite(provider, model) {
  var res = await apiPost(API + '/favorites', { action: 'add', provider: provider, model: model });
  if (res.ok) { favorites = res.favorites; renderFavorites(); renderAgents(); }
}
async function removeFavorite(fav) {
  var res = await apiPost(API + '/favorites', { action: 'remove', provider: fav.provider, model: fav.model });
  if (res.ok) { favorites = res.favorites; renderFavorites(); renderAgents(); }
}

document.getElementById('btn-save').addEventListener('click', async function() {
  var btn = this, payload = { agents: {} };
  for (var n in agents) { payload.agents[n] = agents[n].model; }
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    var res = await apiPost(API + '/config', payload);
    if (res.ok) {
      defaults = JSON.parse(JSON.stringify(agents));
      document.getElementById('restart-banner').classList.remove('hidden');
      btn.textContent = 'Saved ✓'; btn.style.background = 'var(--ok)';
      setTimeout(function() { btn.textContent = 'Save Changes'; btn.disabled = false; btn.style.background = ''; }, 2000);
    } else { showError(res.error || 'Failed to save'); btn.disabled = false; btn.textContent = 'Save Changes'; }
  } catch (e) { showError('Connection error: ' + e.message); btn.disabled = false; btn.textContent = 'Save Changes'; }
});

document.getElementById('btn-restore').addEventListener('click', function() {
  agents = JSON.parse(JSON.stringify(defaults));
  expandedAgent = null; render();
  document.getElementById('restart-banner').classList.add('hidden');
});

init();
</script>
</body>
</html>
