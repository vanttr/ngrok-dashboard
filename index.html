<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ngrok Tunnel Switcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-0: #edf2f5;
    --bg-1: #e3eaef;
    --bg-2: #dfe7eb;
    --ink-strong: #20303a;
    --ink: #344854;
    --ink-soft: #647682;
    --surface: rgba(255,255,255,0.78);
    --surface-glass: rgba(255,255,255,0.66);
    --border: rgba(32,48,58,0.1);
    --accent: #466a5a;
    --accent-strong: #355247;
    --ok: #2e7d44;
    --ok-bg: rgba(46,125,68,0.10);
    --down: #a84747;
    --down-bg: rgba(168,71,71,0.10);
    --drift: #b0822c;
    --drift-bg: rgba(176,130,44,0.10);
    --active-bg: rgba(70,106,90,0.08);
    --active-border: rgba(70,106,90,0.25);
    --text-xs: 0.84rem;
    --text-sm: 0.95rem;
    --text-md: 1rem;
    --text-lg: 1.2rem;
    --text-xl: 1.5rem;
    --radius-card: 24px;
    --radius-btn: 999px;
    --radius-pill: 14px;
  }

  body {
    font-family: 'Roboto', 'Segoe UI', sans-serif;
    background:
      radial-gradient(ellipse 60% 60% at 30% 10%, rgba(70,106,90,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(100,150,180,0.07) 0%, transparent 70%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
    min-height: 100vh;
    color: var(--ink);
    font-size: var(--text-sm);
    line-height: 1.5;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 40% 40% at 50% 30%, rgba(255,255,255,0.45), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .page-shell {
    max-width: 72rem;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
    position: relative;
    z-index: 1;
  }

  /* ---- Hero header card ---- */
  .hero-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
    backdrop-filter: blur(20px) saturate(1.08);
    border-radius: var(--radius-card);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 16px 48px rgba(27,41,50,0.08);
    position: relative;
    overflow: hidden;
    animation: fadeSlideUp 380ms ease;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(70,106,90,0.18), rgba(32,48,58,0.06));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .hero-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .hero-row h1 {
    font-size: var(--text-xl);
    font-weight: 700;
    color: var(--ink-strong);
    letter-spacing: -0.02em;
    line-height: 1.2;
    flex: 1;
    min-width: 200px;
  }

  .hero-url {
    font-size: var(--text-xs);
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    max-width: 400px;
    transition: color 180ms ease;
  }
  .hero-url:hover { color: var(--accent-strong); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.25rem 0.75rem;
    border-radius: var(--radius-pill);
    font-size: var(--text-xs);
    font-weight: 500;
    white-space: nowrap;
  }
  .status-pill .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-connected { background: var(--ok-bg); color: var(--ok); border: 1px solid rgba(46,125,68,0.18); }
  .status-connected .pill-dot { background: var(--ok); }
  .status-disconnected { background: var(--down-bg); color: var(--down); border: 1px solid rgba(168,71,71,0.18); }
  .status-disconnected .pill-dot { background: var(--down); }

  .ngrok-error-msg {
    margin-top: 0.5rem;
    font-size: var(--text-xs);
    color: var(--down);
  }

  /* ---- Server grid ---- */
  .server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* ---- Glass server card ---- */
  .server-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.66));
    backdrop-filter: blur(20px) saturate(1.08);
    border-radius: var(--radius-card);
    padding: 1.25rem 1.5rem;
    box-shadow: 0 8px 32px rgba(27,41,50,0.06);
    transition: transform 180ms ease, box-shadow 180ms ease;
    position: relative;
    animation: fadeSlideUp 380ms ease;
    animation-fill-mode: backwards;
  }

  .server-card:nth-child(1) { animation-delay: 0ms; }
  .server-card:nth-child(2) { animation-delay: 40ms; }
  .server-card:nth-child(3) { animation-delay: 80ms; }
  .server-card:nth-child(4) { animation-delay: 120ms; }
  .server-card:nth-child(5) { animation-delay: 160ms; }
  .server-card:nth-child(6) { animation-delay: 200ms; }
  .server-card:nth-child(7) { animation-delay: 240ms; }

  .server-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(32,48,58,0.08), rgba(32,48,58,0.03));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .server-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 48px rgba(27,41,50,0.1);
  }

  .server-card.active {
    background: linear-gradient(135deg, rgba(70,106,90,0.12), rgba(70,106,90,0.04));
    box-shadow: 0 0 0 1px var(--active-border), 0 12px 40px rgba(70,106,90,0.08);
  }

  .server-card.active::before {
    background: linear-gradient(135deg, var(--accent), rgba(70,106,90,0.3));
  }

  .server-card.dimmed { opacity: 0.55; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.75rem;
  }

  .server-name {
    font-weight: 600;
    font-size: var(--text-md);
    color: var(--ink-strong);
    flex: 1;
  }

  .health-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .health-dot.ok { background: var(--ok); box-shadow: 0 0 6px rgba(46,125,68,0.3); }
  .health-dot.down { background: var(--down); box-shadow: 0 0 6px rgba(168,71,71,0.3); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .port-badge {
    font-size: var(--text-xs);
    color: var(--ink-soft);
    background: rgba(32,48,58,0.06);
    padding: 0.15rem 0.55rem;
    border-radius: var(--radius-pill);
    font-family: 'Roboto Mono', 'Consolas', monospace;
    font-weight: 500;
  }

  .drift-badge {
    font-size: var(--text-xs);
    color: var(--drift);
    background: var(--drift-bg);
    border: 1px solid rgba(176,130,44,0.18);
    padding: 0.15rem 0.55rem;
    border-radius: var(--radius-pill);
    font-weight: 500;
  }

  .active-badge {
    font-size: var(--text-xs);
    color: var(--accent);
    background: var(--active-bg);
    border: 1px solid var(--active-border);
    padding: 0.15rem 0.55rem;
    border-radius: var(--radius-pill);
    font-weight: 500;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .tunnel-btn {
    padding: 0.45rem 1.25rem;
    border-radius: var(--radius-btn);
    border: none;
    font-family: inherit;
    font-size: var(--text-xs);
    font-weight: 600;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #fff;
    box-shadow: 0 2px 12px rgba(70,106,90,0.2);
    transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
  }
  .tunnel-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(70,106,90,0.3);
  }
  .tunnel-btn:active:not(:disabled) { transform: translateY(0); }
  .tunnel-btn:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }

  .tunnel-btn.stop {
    background: linear-gradient(135deg, var(--down), #944040);
    box-shadow: 0 2px 12px rgba(168,71,71,0.2);
  }
  .tunnel-btn.stop:hover:not(:disabled) {
    box-shadow: 0 4px 18px rgba(168,71,71,0.3);
  }

  .tunnel-btn.start {
    background: linear-gradient(135deg, var(--ok), #246836);
    box-shadow: 0 2px 12px rgba(46,125,68,0.2);
  }
  .tunnel-btn.start:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(46,125,68,0.3);
  }
  .tunnel-btn.starting {
    background: linear-gradient(135deg, var(--ink-soft), #506872);
    box-shadow: none;
    cursor: wait;
    animation: btnPulse 1.2s ease-in-out infinite;
  }
  @keyframes btnPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .tunnel-url {
    font-size: var(--text-xs);
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    white-space: nowrap;
  }
  .tunnel-url:hover { text-decoration: underline; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-soft);
    font-size: var(--text-md);
  }

  /* ---- Scheduler card ---- */
  .scheduler-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.66));
    backdrop-filter: blur(20px) saturate(1.08);
    border-radius: var(--radius-card);
    padding: 1.5rem 2rem;
    margin-top: 2rem;
    box-shadow: 0 8px 32px rgba(27,41,50,0.06);
    position: relative;
    animation: fadeSlideUp 380ms ease;
  }

  .scheduler-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(32,48,58,0.08), rgba(32,48,58,0.03));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .scheduler-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .scheduler-title {
    font-weight: 600;
    font-size: var(--text-md);
    color: var(--ink-strong);
  }

  .scheduler-meta {
    font-size: var(--text-xs);
    color: var(--ink-soft);
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .scheduler-meta span { white-space: nowrap; }

  .scheduler-targets {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .scheduler-target-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.4rem 0;
    flex-wrap: wrap;
  }

  .scheduler-target-name {
    font-weight: 500;
    font-size: var(--text-sm);
    color: var(--ink-strong);
    min-width: 120px;
  }

  .scheduler-target-time {
    font-size: var(--text-xs);
    color: var(--ink-soft);
    min-width: 90px;
  }

  .scheduler-target-snippet {
    font-size: var(--text-xs);
    color: var(--ink-soft);
    font-style: italic;
    flex: 1;
    min-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .scheduler-status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.6rem;
    border-radius: var(--radius-pill);
    font-size: var(--text-xs);
    font-weight: 500;
    white-space: nowrap;
  }
  .scheduler-status-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
  .sch-success { background: var(--ok-bg); color: var(--ok); border: 1px solid rgba(46,125,68,0.18); }
  .sch-success .pill-dot { background: var(--ok); }
  .sch-error { background: var(--down-bg); color: var(--down); border: 1px solid rgba(168,71,71,0.18); }
  .sch-error .pill-dot { background: var(--down); }
  .sch-pending { background: rgba(32,48,58,0.04); color: var(--ink-soft); border: 1px solid rgba(32,48,58,0.08); }
  .sch-pending .pill-dot { background: var(--ink-soft); }

  /* ---- Footer ---- */
  .page-footer {
    text-align: center;
    margin-top: 2rem;
    color: var(--ink-soft);
    font-size: var(--text-xs);
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 700px) {
    .server-grid { grid-template-columns: 1fr; }
    .hero-row { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="page-shell">

  <div class="hero-card">
    <div class="hero-row">
      <div>
        <h1>Tunnel Switcher</h1>
        <a id="ngrok-url" class="hero-url" href="#" target="_blank">---</a>
      </div>
      <span id="ngrok-status" class="status-pill status-disconnected">
        <span class="pill-dot"></span>disconnected
      </span>
    </div>
    <div id="ngrok-error" class="ngrok-error-msg"></div>
  </div>

  <div id="server-list" class="server-grid"></div>

  <div id="scheduler-section" class="scheduler-card" style="display:none">
    <div class="scheduler-header">
      <span class="scheduler-title">Scheduled Prompts</span>
      <div class="scheduler-meta">
        <span>Prompt: "<span id="sch-prompt">--</span>"</span>
        <span>Every: <span id="sch-offsets">--</span></span>
        <span>Next: <span id="sch-next">--</span></span>
      </div>
    </div>
    <div id="scheduler-targets" class="scheduler-targets"></div>
  </div>

  <div class="page-footer">
    Dashboard: /dash &middot; Auto-refresh: 10s &middot; Last checked: <span id="last-checked">--</span>
  </div>

</div>

<script>
const API = '/api';

// ---- Flicker-free update helpers ----
// Track cards by port so we can update in place instead of rebuilding DOM
let cardMap = {};  // { port: { el, state } }
let startingPorts = {};  // { configuredPort: { timer, startTime } } — keyed by configuredPort to avoid drift mismatch

function statesEqual(a, b) {
  if (!a || !b) return false;
  return a.name === b.name && a.health === b.health && a.status === b.status &&
         a.configuredPort === b.configuredPort && a.actualPort === b.actualPort &&
         a.isActive === b.isActive && a.ngrokUrl === b.ngrokUrl &&
         a.hasDevScript === b.hasDevScript && a.isStarting === b.isStarting;
}

function serverButtonClass(state) {
  if (state.isStarting) return ' starting';
  return ' start';
}

function serverButtonDisabled(state) {
  return state.isStarting ? 'disabled' : '';
}

function serverButtonLabel(state) {
  if (state.isStarting) return 'Starting...';
  return 'Start Server';
}

function tunnelButtonClass(state) {
  return state.isActive ? ' stop' : '';
}

function tunnelButtonLabel(state) {
  return state.isActive ? 'Stop Tunnel' : 'Start Tunnel';
}

async function fetchState() {
  try {
    const resp = await fetch(`${API}/servers`);
    const data = await resp.json();
    renderHeader(data.ngrokUrl, data.ngrokError);
    renderServers(data.servers, data.target);
    document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();
  } catch (err) {
    document.getElementById('ngrok-error').textContent = 'Cannot reach switcher';
  }

  // Fetch scheduler state independently — failure doesn't affect server display
  try {
    const schedResp = await fetch(`${API}/scheduler`);
    const schedData = await schedResp.json();
    renderScheduler(schedData);
  } catch (err) {
    document.getElementById('scheduler-section').style.display = 'none';
  }
}

function renderHeader(url, error) {
  const link = document.getElementById('ngrok-url');
  const status = document.getElementById('ngrok-status');
  const errorEl = document.getElementById('ngrok-error');

  const connected = !!url;
  const newClass = connected ? 'status-pill status-connected' : 'status-pill status-disconnected';
  const newText = connected ? url : '(no tunnel)';
  const newHref = connected ? (url.startsWith('http') ? url : 'https://' + url) : '#';
  const newInner = connected ? '<span class="pill-dot"></span>connected' : '<span class="pill-dot"></span>disconnected';
  const newError = error || '';

  if (link.textContent !== newText) link.textContent = newText;
  if (link.href !== newHref) link.href = newHref;
  link.style.display = '';
  if (status.className !== newClass) status.className = newClass;
  if (status.innerHTML !== newInner) status.innerHTML = newInner;
  if (errorEl.textContent !== newError) errorEl.textContent = newError;
}

function renderServers(servers, target) {
  const container = document.getElementById('server-list');
  const ngrokUrlText = target ? (document.getElementById('ngrok-url').textContent || '') : '';

  // Compute desired state for each server
  const newStateMap = {};
  if (!servers || servers.length === 0) {
    // Show empty state — clear all existing cards
    const existingKeys = Object.keys(cardMap);
    if (existingKeys.length > 0) {
      // First time or all removed: show empty message
      container.innerHTML = '<div class="empty-state">No servers configured.<br>Add entries to <code>servers.json</code> and restart.</div>';
      cardMap = {};
    }
    // If empty state already showing, do nothing (no flicker)
    if (container.children.length === 0) {
      container.innerHTML = '<div class="empty-state">No servers configured.<br>Add entries to <code>servers.json</code> and restart.</div>';
    }
    return;
  }

  for (const s of servers) {
    const displayPort = s.actualPort || s.configuredPort;
    const isActive = target && s.actualPort === target.port;
    const isDown = s.health === 'down';
    const isDrifted = s.status === 'drifted';
    const ngrokUrl = isActive ? ngrokUrlText : '';

    newStateMap[displayPort] = {
      name: s.name, health: s.health, status: s.status,
      configuredPort: s.configuredPort, actualPort: s.actualPort,
      isActive, isDown, isDrifted, ngrokUrl, displayPort,
      hasDevScript: !!s.hasDevScript,
      isStarting: !!startingPorts[s.configuredPort]  // Use configuredPort as key — avoids drift mismatch
    };

    // If server came online while we were starting it, clear the starting state
    if (s.health === 'ok' && startingPorts[s.configuredPort]) {
      const info = startingPorts[s.configuredPort];
      if (info.timer) clearInterval(info.timer);
      delete startingPorts[s.configuredPort];
    }
  }

  // Remove cards that no longer exist
  for (const port of Object.keys(cardMap)) {
    if (!(port in newStateMap)) {
      cardMap[port].el.remove();
      delete cardMap[port];
    }
  }

  // Remove empty-state if present
  const emptyEl = container.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  // Create or update cards in server order
  let insertBefore = container.firstChild;
  for (const s of servers) {
    const displayPort = s.actualPort || s.configuredPort;
    const state = newStateMap[displayPort];

    if (cardMap[displayPort] && statesEqual(cardMap[displayPort].state, state)) {
      // Unchanged — just ensure correct order
      cardMap[displayPort].state = state;
      if (cardMap[displayPort].el !== insertBefore) {
        container.insertBefore(cardMap[displayPort].el, insertBefore);
      }
      insertBefore = cardMap[displayPort].el.nextSibling;
      continue;
    }

    // Remove old element before replacing — otherwise the old node stays
    // in the DOM as a zombie alongside the new card.
    // Advance insertBefore past the old element BEFORE removing it,
    // otherwise insertBefore becomes a detached reference and
    // container.insertBefore() throws NotFoundError.
    if (cardMap[displayPort]) {
      if (cardMap[displayPort].el === insertBefore) {
        insertBefore = cardMap[displayPort].el.nextSibling;
      }
      cardMap[displayPort].el.remove();
      delete cardMap[displayPort];
    }

    // Build the card HTML
    const card = document.createElement('div');
    card.className = 'server-card' + (state.isActive ? ' active' : '') + (state.isDown ? ' dimmed' : '');

    card.innerHTML = `
      <div class="card-top">
        <span class="server-name">${esc(state.name)}</span>
        <span class="health-dot ${state.health}"></span>
      </div>
      <div class="card-meta">
        <span class="port-badge">:${state.displayPort}</span>
        ${state.isDrifted ? `<span class="drift-badge">shifted from :${state.configuredPort}</span>` : ''}
        ${state.isActive ? '<span class="active-badge">active</span>' : ''}
      </div>
      <div class="card-actions">
        ${state.hasDevScript ? `
          <button class="tunnel-btn${serverButtonClass(state)}" ${serverButtonDisabled(state)} data-action="start-server" data-port="${state.displayPort}">
            ${serverButtonLabel(state)}
          </button>
        ` : ''}
        ${!state.isDown ? `
          <button class="tunnel-btn${tunnelButtonClass(state)}" data-action="tunnel" data-port="${state.displayPort}">
            ${tunnelButtonLabel(state)}
          </button>
        ` : ''}
        ${state.isActive && state.ngrokUrl ? `<a class="tunnel-url" href="${escAttr(state.ngrokUrl)}" target="_blank">Open server &rarr;</a>` : ''}
      </div>
    `;

    const startBtn = card.querySelector('button[data-action="start-server"]');
    if (startBtn) {
      startBtn.addEventListener('click', () => {
        if (state.isStarting) return;
        handleStartServer(startBtn.dataset.port);
      });
    }
    const tunnelBtn = card.querySelector('button[data-action="tunnel"]');
    if (tunnelBtn) {
      tunnelBtn.addEventListener('click', () => {
        handleTunnel(tunnelBtn.dataset.port, state.isActive);
      });
    }

    // Insert in order — insertBefore is guaranteed to be a valid DOM node
    // or null (meaning append at end)
    if (insertBefore && container.contains(insertBefore)) {
      container.insertBefore(card, insertBefore);
    } else {
      container.appendChild(card);
    }

    cardMap[displayPort] = { el: card, state };
    insertBefore = card.nextSibling;
  }
}

async function handleTunnel(port, isActive) {
  const newTarget = isActive ? null : parseInt(port);
  try {
    const resp = await fetch(`${API}/target`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ port: newTarget })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      alert(err.error || 'Failed to switch tunnel');
      return;
    }
    fetchState();
  } catch (err) {
    alert('Network error — cannot reach switcher');
  }
}

async function handleStartServer(port) {
  const key = Number(port);  // Normalize to number for consistent key type

  try {
    const resp = await fetch(`${API}/servers/${port}/start`, { method: 'POST' });
    const data = await resp.json();
    if (!data.ok) {
      alert(data.error || 'Failed to start server');
      return;
    }
  } catch (err) {
    alert('Network error — cannot reach switcher');
    return;
  }

  // Enter starting state — keyed by configuredPort (matches button data-port for down servers)
  startingPorts[key] = { startTime: Date.now() };

  // Fast-poll every 3s for up to 12s
  const pollTimer = setInterval(() => {
    fetchState();

    const info = startingPorts[key];
    if (!info) {
      clearInterval(pollTimer);
      return;
    }

    const elapsed = Date.now() - info.startTime;
    if (elapsed >= 12000) {
      clearInterval(pollTimer);
      delete startingPorts[key];
      fetchState();  // Final refresh to revert button
    }
  }, 3000);

  startingPorts[key].timer = pollTimer;
  fetchState();  // Immediate refresh to show "Starting..." state
}

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
}
function escAttr(s) { return String(s).replace(/"/g, '&quot;'); }

function timeAgo(isoStr) {
  if (!isoStr) return 'never';
  const diff = Date.now() - new Date(isoStr).getTime();
  const seconds = Math.floor(diff / 1000);
  if (seconds < 60) return 'just now';
  const minutes = Math.floor(seconds / 60);
  if (minutes === 1) return '1 min ago';
  if (minutes < 60) return `${minutes} min ago`;
  const hours = Math.floor(minutes / 60);
  if (hours === 1) return '1 hr ago';
  return `${hours} hr ago`;
}

function formatOffsets(offsets) {
  return offsets.map(o => ':' + String(o).padStart(2, '0')).join(', ');
}

function formatNextFire(isoStr) {
  if (!isoStr) return '--';
  return new Date(isoStr).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function renderScheduler(data) {
  const section = document.getElementById('scheduler-section');
  if (!data || !data.enabled) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';

  document.getElementById('sch-prompt').textContent = esc(data.prompt);
  document.getElementById('sch-offsets').textContent = formatOffsets(data.minuteOffsets);
  document.getElementById('sch-next').textContent = formatNextFire(data.nextFire);

  const container = document.getElementById('scheduler-targets');
  let html = '';
  for (const t of data.targets) {
    const statusClass = t.status === 'success' ? 'sch-success' :
                        t.status === 'error' ? 'sch-error' : 'sch-pending';
    const statusLabel = t.status === 'success' ? 'Success' :
                        t.status === 'error' ? 'Error' : 'Pending';
    const snippet = t.responsePreview ? esc(t.responsePreview) : (t.error ? esc(t.error) : '—');
    html += `
      <div class="scheduler-target-row">
        <span class="scheduler-target-name">${esc(t.name)}</span>
        <span class="scheduler-status-pill ${statusClass}">
          <span class="pill-dot"></span>${statusLabel}
        </span>
        <span class="scheduler-target-time">${timeAgo(t.lastRun)}</span>
        <span class="scheduler-target-snippet" title="${esc(t.responsePreview || t.error || '')}">${snippet}</span>
      </div>
    `;
  }
  container.innerHTML = html;
}

fetchState();
setInterval(fetchState, 10000);
</script>
